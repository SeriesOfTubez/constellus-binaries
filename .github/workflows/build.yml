name: build-binaries

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "binaries/**"
      - ".github/workflows/build.yml"
  schedule:
    # Weekly re-scan: re-run govulncheck/Trivy against the published pins so a
    # newly-disclosed reachable vuln fails the build even without a version bump.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  packages: write       # push image to GHCR
  id-token: write        # OIDC for provenance attestation
  attestations: write    # write the SLSA provenance attestation

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add a binary: create binaries/<name>/ (build.env + Dockerfile) and list it here.
        binary: [zgrab2]
    steps:
      - uses: actions/checkout@v4

      - name: Load build config
        run: grep -vE '^\s*(#|$)' "binaries/${{ matrix.binary }}/build.env" >> "$GITHUB_ENV"

      - name: Lowercase owner (GHCR requires lowercase)
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"

      # ── Security gate: reachability-aware vuln scan of the pinned source ──
      # govulncheck flags a vuln only if the built command actually reaches the
      # vulnerable symbol — the authoritative, low-noise gate for a third-party
      # tool we don't maintain. A reachable finding fails the build.
      - name: Fetch pinned source
        run: git clone --depth 1 --branch "$VERSION" "$REPO" .src

      - name: govulncheck (reachability gate)
        working-directory: .src
        run: |
          # Apply the same security dep overrides the image build uses, so the
          # gate verifies the exact module tree we ship.
          if [ -n "$GO_PATCHES" ]; then go get $GO_PATCHES && go mod tidy; fi
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" "$PKG/..."

      # ── Build + publish the versioned image (static binary in scratch) ──
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: "binaries/${{ matrix.binary }}"
          push: true
          tags: "ghcr.io/${{ env.OWNER_LC }}/${{ matrix.binary }}:${{ env.VERSION }}"
          provenance: false   # SLSA provenance attested explicitly below
          build-args: |
            REPO=${{ env.REPO }}
            VERSION=${{ env.VERSION }}
            PKG=${{ env.PKG }}
            BIN=${{ env.BIN }}
            GO_VERSION=${{ env.GO_VERSION }}
            GO_PATCHES=${{ env.GO_PATCHES }}

      # ── SBOM + supply-chain provenance for the published artifact ──
      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: "ghcr.io/${{ env.OWNER_LC }}/${{ matrix.binary }}@${{ steps.build.outputs.digest }}"
          format: cyclonedx
          output: "sbom-${{ matrix.binary }}.cyclonedx.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: "sbom-${{ matrix.binary }}"
          path: "sbom-${{ matrix.binary }}.cyclonedx.json"
          retention-days: 90

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: "ghcr.io/${{ env.OWNER_LC }}/${{ matrix.binary }}"
          subject-digest: "${{ steps.build.outputs.digest }}"
          push-to-registry: true

      - name: Summary
        run: |
          echo "### ${{ matrix.binary }} ${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "Published \`ghcr.io/${OWNER_LC}/${{ matrix.binary }}:${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
